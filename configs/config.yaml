tracking_config: configs\ocsort.yaml
# 推理尺寸（相机更近、蛋/二维码在画面中变大时的适配）：
# - imgsz 越小：推理更快、目标在特征图上更“接近训练尺度”，对“近距离大目标”更友好
# - imgsz 越大：对远距离小目标更友好，但会显著降低FPS（移动时更容易漏检）
# 你当前描述“蛋占画面 10%~20% 且近距离”，优先使用 448（接近你原训练/部署尺度）。
imgsz: 768
# 新场景外观/颜色变化时，建议把 conf 先降到 0.1~0.2 以减少漏检；
# 配合 configs/ocsort.yaml 的 det_thresh=0.3，可让 0.1~0.3 的低分框用于“补跟踪”（不新建轨迹），整体更稳。
# 低速抖动场景：适当回升 conf 到 0.15，减少因光影晃动产生的误检。
# 画面较暗场景：回退 conf 到 0.1，避免漏检。
# 置信度阈值：
# - 为了“移动中不漏检”，建议降低到 0.05，让 0.05~det_thresh 的低分框进入跟踪器做“补跟踪/保ID”
# - 后续通过 stable_T/迟滞/二维码格式校验过滤误检
conf: 0.2
iou: 0.4

