# RTMDet 模型参数（model_type=rtmdet 时生效）
rtmdet:
  obb_model: resources/rtmdet_obb_qrcode.onnx
  ins_model: resources/rtmdet_ins_egg.onnx
  imgsz: 640
  conf: 0.5
  iou: 0.5
  validity_threshold: 0.7
  use_fp16: false

# 拓扑匹配参数（model_type=rtmdet 时生效）
topology_matcher:
  max_match_distance: 200
  cost_weights:
    position: 0.6
    validity: 0.3
    topology: 0.1
  validity_threshold: 0.7
  min_appear_frames: 5

# 匹配与稳定性参数（新增）
matching:
  alpha_x: 0.65           # 自适应横向阈值比例 |cx_egg-cx_qr| ≤ alpha_x * S_px
  beta_edge: 0.06          # 走廊边界忽略比例（距离分界 < beta_edge * S_px 的蛋忽略）
  # 低速抖动场景优化：
  # switch_n: 调大到 6。车速慢时间充裕，增加滞后以抵抗边缘抖动导致的归属闪烁。
  # stable_T: 调大到 8。更严格的稳定时间，过滤颠簸产生的重影/误检。
  switch_n: 6               # 切换滞后：连续N帧优势满足才切换笼位
  switch_margin_ratio: 0.2 # 切换所需优势（margin = ratio * S_px）
  stable_T: 6              # 计数所需的稳定帧数阈值
  lock_T: 3                # 提前锁定阈值（稳定帧达到该值就锁定，减少重复匹配）
  switch_requires_prev_missing: true  # 上一个二维码仍在画面时不切换，避免重复匹配
  egg_detect_min_conf: 0.2  # 蛋检测过滤阈值（降低误检，不影响二维码）
  egg_min_conf: 0.2         # 蛋计数置信度阈值（过滤误检，影响最终计数）
  force_stable_T: 3         # 停止巡检时的最低稳定帧要求
  switch_min_ratio: 0.7     # 新二维码明显更近时允许切换
  use_force_on_timeout: true # 超时汇总时使用更低稳定阈值
  vertical_roi:            # 垂直几何约束
    enabled: true
    qr_offset_ratio: 0.2   # 下方起始= y_qr_center + 0.2 * H_qr
    bottom_ratio: 0.95     # 底部= frame_h * 0.95

# 二维码解码配置（增强）
qr_decode:
  use_async: true
  max_workers: 2
  global_interval_ms: 150    # 全局解码间隔（原250，调低以增加尝试频率）
  try_interval_ms: 400       # 单track重试间隔（原600）
  max_tries: 50              # 最大尝试次数（原30）
  min_box_size: 80            # 最小可解边长
  target_min_side: 400       # 放大基准（原360）
  scales: [1.2, 1.5, 2.0]    # 增加放大尺度尝试
  debug_save: false          # 关闭失败图片保存，减少IO抖动
  debug_dir: output/qr_debug # 失败图片保存路径
  early_decode_enabled: true
  early_decode_interval_ms: 700   # 早期解码频率（减少每帧解码造成的卡顿）
  early_decode_min_box_size: 100   # 太小的二维码不做早期解码
  early_decode_max_per_frame: 3   # 每帧最多解码的二维码数量
  early_decode_success_ttl_s: 90  # 同一二维码成功后短时间不重复解码
  qr_filter_enabled: true         # 仅保留画面上方二维码
  qr_top_ratio: 0.40              # 画面上方占比(0~1)，越小越“靠上”
  qr_keep_seconds: 0.4            # 二维码短暂丢检保活时间（秒）

# 图像预处理（可选）：用于新场景光照/颜色偏移，提高检出与跟踪稳定性
